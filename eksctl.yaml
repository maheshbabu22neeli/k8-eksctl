# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
  - name: spot
    instanceTypes:
      - t3.medium
      - t3a.medium
      - m5.large
      - m5a.large
      - m6i.large
      - m6a.large
      - c5.large
      - c5a.large
      - c6i.large
      - c6a.large
    spot: true
    desiredCapacity: 2